<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>学生成绩管理系统 - 管理界面</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div class="header">
        <h1>学生成绩管理系统</h1>
        <div class="user-info">
            <span>欢迎，[[${session.admin.username}]]</span>
            <a href="/logout" class="logout-btn">退出登录</a>
        </div>
    </div>

    <!-- 添加学生表单 -->
    <div class="form-section">
        <h2>添加学生信息</h2>
        <form th:action="@{/add}" th:object="${student}" method="post">
            <div class="form-row">
                <div class="form-group">
                    <label>姓名：</label>
                    <input type="text" th:field="*{name}" required placeholder="请输入姓名">
                </div>
                <div class="form-group">
                    <label>年龄：</label>
                    <input type="number" th:field="*{age}" required placeholder="请输入年龄">
                </div>
                <div class="form-group">
                    <label>性别：</label>
                    <select th:field="*{gender}" required>
                        <option value="">请选择</option>
                        <option value="男">男</option>
                        <option value="女">女</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>成绩：</label>
                    <input type="number" step="0.5" th:field="*{score}" required placeholder="请输入成绩">
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary">添加学生</button>
                </div>
            </div>
            <div th:if="${error}" class="error-message" th:text="${error}"></div>
        </form>
    </div>

    <!-- 搜索表单 -->
    <div class="search-section">
        <h2>查询学生</h2>
        <form th:action="@{/search}" method="post">
            <div class="search-box">
                <input type="text" name="keyword" placeholder="输入姓名/年龄/性别/成绩进行查询"
                       th:value="${searchKeyword}" required>
                <button type="submit" class="btn btn-search">查询</button>
                <a href="/index" class="btn btn-reset">显示全部</a>
            </div>
        </form>
    </div>

    <!-- 学生列表 -->
    <div class="table-section">
        <h2>学生列表 <span class="count">(共 [[${students.size()}]] 人)</span></h2>
        <div th:if="${students.empty}" class="empty-message">
            暂无学生数据，请添加学生信息
        </div>
        <table th:unless="${students.empty}">
            <thead>
            <tr>
                <th>ID</th>
                <th>姓名</th>
                <th>年龄</th>
                <th>性别</th>
                <th>成绩</th>
                <th>排名</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="student,stat : ${students}">
                <td th:text="${student.id}"></td>
                <td th:text="${student.name}"></td>
                <td th:text="${student.age}"></td>
                <td th:text="${student.gender}"></td>
                <td th:text="${student.score}"></td>
                <td th:text="${stat.count}"></td>
                <td>
                    <button class="btn btn-edit" th:onclick="editStudent([[${student.id}]])">编辑</button>
                    <button class="btn btn-delete" th:onclick="deleteStudent([[${student.id}]])">删除</button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- 编辑对话框 -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2>编辑学生信息</h2>
        <form th:action="@{/update}" th:object="${student}" method="post" id="editForm">
            <input type="hidden" name="id" id="editId">
            <div class="form-group">
                <label>姓名：</label>
                <input type="text" name="name" id="editName" required>
            </div>
            <div class="form-group">
                <label>年龄：</label>
                <input type="number" name="age" id="editAge" required>
            </div>
            <div class="form-group">
                <label>性别：</label>
                <select name="gender" id="editGender" required>
                    <option value="男">男</option>
                    <option value="女">女</option>
                </select>
            </div>
            <div class="form-group">
                <label>成绩：</label>
                <input type="number" step="0.5" name="score" id="editScore" required>
            </div>
            <div th:if="${updateError}" class="error-message" th:text="${updateError}"></div>
            <div class="form-buttons">
                <button type="submit" class="btn btn-primary">保存修改</button>
                <button type="button" class="btn btn-cancel" onclick="closeModal()">取消</button>
            </div>
        </form>
    </div>
</div>

<script th:inline="javascript">
    function deleteStudent(id) {
        if (confirm('确定要删除该学生信息吗？')) {
            window.location.href = '/delete/' + id;
        }
    }

    function editStudent(id) {
        fetch('/edit/' + id)
            .then(response => response.json())
            .then(student => {
                document.getElementById('editId').value = student.id;
                document.getElementById('editName').value = student.name;
                document.getElementById('editAge').value = student.age;
                document.getElementById('editGender').value = student.gender;
                document.getElementById('editScore').value = student.score;
                document.getElementById('editModal').style.display = 'block';
            });
    }

    function closeModal() {
        document.getElementById('editModal').style.display = 'none';
    }

    window.onclick = function(event) {
        var modal = document.getElementById('editModal');
        if (event.target == modal) {
            modal.style.display = 'none';
        }
    }
</script>
</body>
</html>
