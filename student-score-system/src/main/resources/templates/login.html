<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>学生成绩管理系统 - 登录</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="login-container">
    <div class="login-box">
        <h1>学生成绩管理系统</h1>

        <div class="tab-container">
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="showTab('login')">登录</button>
                <button class="tab-btn" onclick="showTab('register')">注册</button>
            </div>

            <!-- 登录表单 -->
            <div id="login-tab" class="tab-content active">
                <form th:action="@{/login}" method="post">
                    <div class="form-group">
                        <label>用户名：</label>
                        <input type="text" name="username" required placeholder="请输入用户名">
                    </div>
                    <div class="form-group">
                        <label>密码：</label>
                        <input type="password" name="password" required placeholder="请输入密码">
                    </div>
                    <div th:if="${error}" class="error-message" th:text="${error}"></div>
                    <div th:if="${success}" class="success-message" th:text="${success}"></div>
                    <button type="submit" class="submit-btn">登录</button>
                </form>
            </div>

            <!-- 注册表单 -->
            <div id="register-tab" class="tab-content">
                <form th:action="@{/register}" method="post">
                    <div class="form-group">
                        <label>用户名：</label>
                        <input type="text" name="username" required placeholder="请输入用户名">
                    </div>
                    <div class="form-group">
                        <label>密码：</label>
                        <input type="password" name="password" required placeholder="请输入密码">
                    </div>
                    <div class="form-group">
                        <label>确认密码：</label>
                        <input type="password" name="confirmPassword" required placeholder="请再次输入密码">
                    </div>
                    <div th:if="${registerError}" class="error-message" th:text="${registerError}"></div>
                    <button type="submit" class="submit-btn">注册</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function showTab(tabName) {
        // 隐藏所有tab内容
        document.querySelectorAll('.tab-content').forEach(tab => {
            tab.classList.remove('active');
        });
        // 移除所有按钮的active类
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        // 显示选中的tab
        document.getElementById(tabName + '-tab').classList.add('active');
        // 高亮选中的按钮
        event.target.classList.add('active');
    }
</script>
</body>
</html>
